name: quickscan_pro
description: The Fastest QR & Barcode Scanner
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Camera & Scanning
  mobile_scanner: ^5.1.1
  
  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  
  # Permissions
  permission_handler: ^11.3.1
  
  # Smart Actions
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  
  # QR Generation
  qr_flutter: ^4.1.0
  
  # Image Handling
  image_picker: ^1.1.2
  image: ^4.2.0
  saver_gallery: ^3.0.6
  
  # UI Enhancements
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_slidable: ^3.1.0
  
  # Utilities
  intl: ^0.19.0
  flutter_vibrate: ^1.3.0
  clipboard: ^0.1.3
  shared_preferences: ^2.2.3
  uuid: ^4.4.0
  
  # Additional Features
  csv: ^6.0.0
  printing: ^5.13.1
  pdf: ^3.11.0
  # Icons
  cupertino_icons: ^1.0.8
  google_mobile_ads: ^5.1.0

  # Splash Screen
  flutter_native_splash: ^2.4.0
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.13.1
  
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/system/splash/
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#2196F3"
  image: assets/system/splash/splash.png
  branding: assets/system/splash/brand.png
  android_12:
    image: assets/system/splash/splash.png
    color: "#2196F3"
    branding: assets/system/splash/brand.png
  fullscreen: true
